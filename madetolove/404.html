<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madetolove - Главная</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="order-header">
      <div class="container">
        <a href="/" class="order-header__logo">
          <img src="assets/images/logo.svg" alt="madetolove" />
        </a>
      </div>
    </header>

    <main class="main-order">
      <div class="container">
        <section class="not-found">
          <div class="not-found__content">
            <div class="not-found__404">404</div>
            <div class="not-found__title">Страница не найдена!</div>
            <p class="not-found__desc">
              Страница на которую вы пытались попасть не найдена, возможно вы
              ввели неверный адрес или страница удалена.
            </p>
            <a href="/" class="not-found__link">
              <p>На главную</p>
              <img src="assets/images/icons/arrow-right.svg" alt="arrow" />
            </a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
