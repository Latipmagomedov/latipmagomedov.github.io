<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madetolove - Главная</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="order-header">
      <div class="container">
        <a href="/" class="order-header__back">
          <img src="assets/images/icons/arrow-left.svg" alt="arrow" />
          <p>Вернуться в магазин</p>
        </a>

        <a href="/" class="order-header__logo">
          <img src="assets/images/logo.svg" alt="madetolove" />
        </a>
      </div>
    </header>

    <main class="main-order">
      <div class="container">
        <section class="thanks">
          <div class="thanks__content">
              <img src="assets/images/icons/heart-thanks.svg" alt="heart" class="thanks__img" >
              <div class="thanks__title">Спасибо за заказ!</div>
              <p class="thanks__desc">
                В ближайшее время мы свяжемся с Вами 
                для уточнения деталей
              </p>
              <a href="/" class="thanks__link">
                <p>На главную</p>
                <img src="assets/images/icons/arrow-right.svg" alt="arrow" >
            </a>
          </div>
        </section>

        
      </div>
    </main>

    <script src="assets/js/dropdown.js"></script>
    <script src="assets/js/menu.js"></script>
    <script src="assets/js/modal.js"></script>
  </body>
</html>
